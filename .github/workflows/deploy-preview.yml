name: Deploy Preview (Cloudflare Pages)

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

concurrency:
  group: cf-preview-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  deployments: write

jobs:
  deploy-preview:
    name: Build & deploy PR preview
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      HEAD_REF: ${{ github.head_ref || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build site
        run: npm run build
        env:
          NODE_ENV: production

      - name: Sanitize branch name
        id: branch
        run: |
          # Cloudflare Pages branch names must be [a-z0-9-] and <=28 chars.
          # HEAD_REF is passed via env to avoid script-injection per
          # https://github.blog/security/vulnerability-research/how-to-catch-github-actions-workflow-injections-before-attackers-do/
          SAFE="$(printf '%s' "$HEAD_REF" | tr '[:upper:]' '[:lower:]' | tr -c 'a-z0-9-' '-' | sed 's/--*/-/g;s/^-//;s/-$//' | cut -c1-28)"
          if [ -z "$SAFE" ]; then SAFE="preview"; fi
          echo "name=$SAFE" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name aiso-group --branch ${{ steps.branch.outputs.name }}

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          DEPLOY_URL: ${{ steps.deploy.outputs.deployment-url }}
          DEPLOY_ALIAS: ${{ steps.deploy.outputs.deployment-alias-url }}
        with:
          script: |
            const url = process.env.DEPLOY_URL || '';
            const alias = process.env.DEPLOY_ALIAS || '';
            const body = [
              '### Cloudflare Pages preview',
              '',
              `Deployment: ${url || '(not reported)'}`,
              alias ? `Branch alias: ${alias}` : '',
              '',
              '_Rebuilt on every push to this PR._'
            ].filter(Boolean).join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
